spring:
  application:
    name: USER-MICROSERVICE
  r2dbc:
    url: r2dbc:mysql://localhost:3306/power_school_user_dev
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  datasource:
    mysql:
      url: jdbc:mysql://localhost:3306/power_school_user_dev
      username: root
      password: root
      driver-class-name: com.mysql.cj.jdbc.Driver
    data:
      mongodb:
        uri: mongodb://localhost:27017/power_school_user_dev
        database: power_school_user_dev
    liquibase:
      enabled: true
      change-log: classpath:db/master-changelog.xml
      contexts: development
      default-schema: power_school_dev # Kept consistent with your database URL
      liquibase-schema: power_school_dev
      drop-first: false
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    enabled: true
  instance:
    prefer-ip-address: true
    hostname: localhost
server:
  port: 8080